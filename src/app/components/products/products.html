<section class="py-5 bg-light">
  <div class="container">

    <!-- Section Title -->
    <h2 class="text-center fw-bold mb-5">Our Products</h2>

    <!-- Products Grid -->
    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-4 g-4" >
      @for (product of products; track $index) {
      <!-- Product 1 -->
      <div class="col">
        <div class="card h-100 shadow-sm" appScaleElement>
          <img
            [src]="product.image"
            [alt]="product.name"
            class="card-img-top product-img"
          />
          <div class="card-body d-flex flex-column text-center">
            <h5 class="card-title fw-bold">{{product.name}}</h5>
            <p class="fw-semibold fs-5" [style.color]="product.price > 100 ? 'red' : 'green'">
                ${{ product.price }}
              </p>
              <!-- Class Binding - stock badge -->
              <span class="badge mb-3" [class.bg-success]="product.inStock" [ngClass]="{'bg-danger': !product.inStock}">
                {{ product.inStock ? 'In Stock' : 'Out of Stock' }}
              </span>
              <button
                class="btn mt-auto w-100"
                [class.btn-dark]="product.inStock"
                [class.btn-secondary]="!product.inStock"
                [disabled]="!product.inStock"
              >
                {{ product.inStock ? 'Buy Now' : 'Unavailable' }}
              </button>
          </div>
        </div>
      </div>
    }
    </div>
  </div>
</section>
